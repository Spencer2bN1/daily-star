spring.application.name=daily-star
spring.profiles.active=dev

server.port=8080
server.servlet.context-path=/daily-star
server.shutdown=graceful

spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=Asia/Shanghai
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.default-fetch-size=100
mybatis.configuration.default-statement-timeout=30
mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl
mybatis.type-aliases-package=com.dailystar.entity,com.dailystar.enums

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.dailystar.controller

dailystar.auth.jwt.secret=DailyStarJwtSecretKeyForDevAndTest1234567890
dailystar.auth.jwt.expire-seconds=604800
