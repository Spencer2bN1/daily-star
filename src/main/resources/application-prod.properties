# production datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DAILYSTAR_DB_HOST}:${DAILYSTAR_DB_PORT:3306}/${DAILYSTAR_DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DAILYSTAR_DB_USERNAME}
spring.datasource.password=${DAILYSTAR_DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

logging.level.root=info
logging.level.com.dailystar=info
